<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        textarea {
            width: 60%;
            height: 150px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>📰 Fake News Detection</h1>

    <form method="POST">
        <textarea name="news" placeholder="Enter news text..."></textarea><br>
        <button type="submit">Check</button>
    </form>

    <h2>{{ prediction }}</h2>

</body>
</html>
